name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install fledge
        env:
          FLEDGE_VERSION: v1.4.2
        run: |
          curl -fsSL \
            "https://github.com/CorvidLabs/fledge/releases/download/${FLEDGE_VERSION}/fledge-linux-x86_64" \
            -o /usr/local/bin/fledge
          chmod +x /usr/local/bin/fledge
          fledge --version

      - name: Run CI lane
        run: fledge run ci
