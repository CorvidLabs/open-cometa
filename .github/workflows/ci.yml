name: CI

on:
  pull_request:
    paths:
      - src/**
      - public/**
      - package.json
      - bun.lock
      - bun.lockb
      - package-lock.json
      - tsconfig*.json
      - .github/workflows/ci.yml
  push:
    branches-ignore: [main]
    paths:
      - src/**
      - public/**
      - package.json
      - bun.lock
      - bun.lockb
      - package-lock.json
      - tsconfig*.json
      - .github/workflows/ci.yml
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install fledge
        env:
          FLEDGE_VERSION: v1.4.2
        run: |
          curl -fsSL \
            "https://github.com/CorvidLabs/fledge/releases/download/${FLEDGE_VERSION}/fledge-linux-x86_64" \
            -o /usr/local/bin/fledge
          chmod +x /usr/local/bin/fledge
          fledge --version

      - name: Run CI lane
        run: fledge run ci
