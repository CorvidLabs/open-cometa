name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install fledge
        env:
          FLEDGE_VERSION: v1.4.2
        run: |
          curl -fsSL \
            "https://github.com/CorvidLabs/fledge/releases/download/${FLEDGE_VERSION}/fledge-linux-x86_64" \
            -o /usr/local/bin/fledge
          chmod +x /usr/local/bin/fledge

      - name: Run CI lane
        run: fledge run ci

      - name: Add 404 fallback for SPA-like routing
        run: cp public/index.html public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
